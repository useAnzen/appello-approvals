<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appello — Approval Documents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fafbfc;
            --surface: #ffffff;
            --border: #e2e6ea;
            --text-primary: #1a2332;
            --text-secondary: #5a6577;
            --accent: #2563eb;
            --accent-light: #eff4ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 24px 0;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 700;
            font-size: 18px;
        }

        .brand h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .brand span {
            color: var(--text-secondary);
            font-weight: 400;
            font-size: 14px;
            margin-left: 8px;
        }

        .content {
            padding: 48px 0;
        }

        .intro {
            margin-bottom: 40px;
        }

        .intro h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .intro p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
        }

        .doc-grid {
            display: grid;
            gap: 16px;
        }

        .doc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .doc-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .doc-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .doc-icon svg {
            width: 24px;
            height: 24px;
            color: var(--accent);
        }

        .doc-info h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .doc-info p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .doc-meta {
            margin-left: auto;
            text-align: right;
            flex-shrink: 0;
        }

        .doc-meta .date {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .doc-meta .badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 6px;
            margin-top: 4px;
        }

        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-approved {
            background: #d1fae5;
            color: #065f46;
        }

        .empty-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .footer {
            border-top: 1px solid var(--border);
            padding: 24px 0;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="brand">
                <div class="brand-icon">A</div>
                <h1>Appello <span>Approval Documents</span></h1>
            </div>
        </div>
    </header>

    <main class="content">
        <div class="container">
            <div class="intro">
                <h2>Documents</h2>
                <p>Review and approve project documents shared by your Appello team.</p>
            </div>

            <div class="doc-grid" id="doc-list">
                <!-- Documents will be listed here. Add new documents as <a> cards. -->
                <!-- Example:
                <a href="./docs/safety-incident-plan.html" class="doc-card">
                    <div class="doc-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                        </svg>
                    </div>
                    <div class="doc-info">
                        <h3>Safety Incident Management Plan</h3>
                        <p>Comprehensive safety and incident tracking proposal</p>
                    </div>
                    <div class="doc-meta">
                        <div class="date">Mar 11, 2026</div>
                        <div class="badge badge-pending">Pending Review</div>
                    </div>
                </a>
                -->
            </div>

            <div class="empty-state" id="empty-state">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
                </svg>
                <h3>No documents yet</h3>
                <p>Documents will appear here as they are published for review.</p>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            &copy; 2026 Appello. All rights reserved.
        </div>
    </footer>
</body>
</html>
