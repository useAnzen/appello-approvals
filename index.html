<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appello — Work Packages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./shared.css">
    <style>
        .doc-grid {
            display: grid;
            gap: 16px;
        }

        .doc-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            text-decoration: none;
            color: inherit;
            display: flex;
            gap: 20px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .doc-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .doc-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-light);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
            align-self: flex-start;
        }

        .filter-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .filter-bar select {
            font-family: inherit;
            font-size: 13px;
            padding: 7px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text-primary);
            outline: none;
            cursor: pointer;
        }

        .filter-bar select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .filter-bar .sort-btn {
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--surface);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-bar .sort-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .filter-bar .sort-btn.active {
            background: var(--accent-light);
            border-color: var(--accent);
            color: var(--accent);
        }

        .stats-row {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 20px;
            flex: 1;
            min-width: 120px;
        }

        .stat-card .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .stat-card .stat-label {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-muted);
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div id="app-header"></div>

    <main class="app-content">
        <div class="app-container">
            <div class="page-header">
                <h2>Work Packages</h2>
                <p>Review and approve work packages shared by your Appello team.</p>
            </div>

            <div class="stats-row" id="stats-row" style="display:none"></div>

            <div class="filter-bar" id="filter-bar" style="display:none">
                <label>Status</label>
                <select id="filter-status">
                    <option value="">All</option>
                    <option value="draft">Draft</option>
                    <option value="pending_review">Pending Review</option>
                    <option value="needs_changes">Needs Changes</option>
                    <option value="approved">Approved</option>
                    <option value="in_development">In Development</option>
                    <option value="in_review">In Review</option>
                    <option value="deployed">Deployed</option>
                </select>
                <label>Sort</label>
                <select id="sort-by">
                    <option value="created_at">Date Created</option>
                    <option value="rice">RICE Score</option>
                    <option value="priority">Priority</option>
                    <option value="title">Title</option>
                </select>
            </div>

            <div class="doc-grid" id="doc-list">
                <div class="loading">Loading work packages...</div>
            </div>
        </div>
    </main>

    <footer class="app-footer">
        <div class="app-container">&copy; 2026 Appello. All rights reserved.</div>
    </footer>

    <script src="./feedback-config.js"></script>
    <script src="./shared.js"></script>
    <script>
    (function () {
        var cfg = window.FEEDBACK_CONFIG;
        if (!cfg) return;

        var API = cfg.supabaseUrl + "/rest/v1";
        var headers = {
            apikey: cfg.supabaseKey,
            Authorization: "Bearer " + cfg.supabaseKey
        };

        var STATUS_LABELS = {
            draft: "Draft",
            pending_review: "Pending Review",
            needs_changes: "Needs Changes",
            approved: "Approved",
            in_development: "In Development",
            in_review: "In Review",
            deployed: "Deployed"
        };

        var DOC_ICON = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:24px;height:24px;color:#2563eb"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg>';

        var ICON_TICKET = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16.5 6v.75m0 3v.75m0 3v.75m0 3V18m-9-5.25h5.25M7.5 15h3M3.375 5.25c-.621 0-1.125.504-1.125 1.125v3.026a2.999 2.999 0 0 1 0 5.198v3.026c0 .621.504 1.125 1.125 1.125h17.25c.621 0 1.125-.504 1.125-1.125v-3.026a2.999 2.999 0 0 1 0-5.198V6.375c0-.621-.504-1.125-1.125-1.125H3.375Z" /></svg>';

        var ICON_PR = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21 3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5" /></svg>';

        var ICON_CUSTOMER = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M18 18.72a9.094 9.094 0 0 0 3.741-.479 3 3 0 0 0-4.682-2.72m.94 3.198.001.031c0 .225-.012.447-.037.666A11.944 11.944 0 0 1 12 21c-2.17 0-4.207-.576-5.963-1.584A6.062 6.062 0 0 1 6 18.719m12 0a5.971 5.971 0 0 0-.941-3.197m0 0A5.995 5.995 0 0 0 12 12.75a5.995 5.995 0 0 0-5.058 2.772m0 0a3 3 0 0 0-4.681 2.72 8.986 8.986 0 0 0 3.74.477m.94-3.197a5.971 5.971 0 0 0-.94 3.197M15 6.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0Zm6 3a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Zm-13.5 0a2.25 2.25 0 1 1-4.5 0 2.25 2.25 0 0 1 4.5 0Z" /></svg>';

        var ICON_RICE = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z" /></svg>';

        var ICON_FEEDBACK = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 8.25h9m-9 3H12m-9.75 1.51c0 1.6 1.123 2.994 2.707 3.227 1.129.166 2.27.293 3.423.379.35.026.67.21.865.501L12 21l2.755-4.133a1.14 1.14 0 0 1 .865-.501 48.172 48.172 0 0 0 3.423-.379c1.584-.233 2.707-1.626 2.707-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.018Z" /></svg>';

        var allPackages = [];
        var allTickets = [];
        var allPrs = [];
        var allFeedback = [];

        function formatDate(iso) {
            var d = new Date(iso);
            return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
        }

        function esc(s) {
            var d = document.createElement("div");
            d.textContent = s || "";
            return d.innerHTML;
        }

        function calcRice(wp) {
            if (wp.rice_reach == null || wp.rice_impact == null || wp.rice_confidence == null || wp.rice_effort == null) return null;
            if (wp.rice_effort === 0) return null;
            return (wp.rice_reach * wp.rice_impact * (wp.rice_confidence / 100)) / wp.rice_effort;
        }

        function riceClass(score) {
            if (score == null) return "";
            if (score >= 5) return "rice-high";
            if (score >= 2) return "rice-med";
            return "rice-low";
        }

        function groupBy(arr, key) {
            var map = {};
            (arr || []).forEach(function (item) {
                var k = item[key];
                if (!map[k]) map[k] = [];
                map[k].push(item);
            });
            return map;
        }

        function renderStats(packages) {
            var row = document.getElementById("stats-row");
            var total = packages.length;
            var byStatus = groupBy(packages, "status");
            var active = (byStatus.in_development || []).length + (byStatus.in_review || []).length;
            var pending = (byStatus.pending_review || []).length + (byStatus.needs_changes || []).length;
            var deployed = (byStatus.deployed || []).length;
            var withRice = packages.filter(function (wp) { return calcRice(wp) != null; }).length;

            row.style.display = "";
            row.innerHTML =
                '<div class="stat-card"><div class="stat-value">' + total + '</div><div class="stat-label">Total</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + pending + '</div><div class="stat-label">Awaiting Review</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + active + '</div><div class="stat-label">In Progress</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + deployed + '</div><div class="stat-label">Deployed</div></div>' +
                '<div class="stat-card"><div class="stat-value">' + withRice + '/' + total + '</div><div class="stat-label">RICE Scored</div></div>';
        }

        function renderCards() {
            var statusFilter = document.getElementById("filter-status").value;
            var sortBy = document.getElementById("sort-by").value;
            var ticketsByWp = groupBy(allTickets, "work_package_id");
            var prsByWp = groupBy(allPrs, "work_package_id");
            var feedbackBySlug = groupBy(allFeedback, "document_slug");

            var filtered = allPackages.filter(function (wp) {
                if (statusFilter && wp.status !== statusFilter) return false;
                return true;
            });

            if (sortBy === "rice") {
                filtered.sort(function (a, b) {
                    var ra = calcRice(a);
                    var rb = calcRice(b);
                    if (ra == null && rb == null) return 0;
                    if (ra == null) return 1;
                    if (rb == null) return -1;
                    return rb - ra;
                });
            } else if (sortBy === "priority") {
                filtered.sort(function (a, b) { return (b.priority || 0) - (a.priority || 0); });
            } else if (sortBy === "title") {
                filtered.sort(function (a, b) { return (a.title || "").localeCompare(b.title || ""); });
            }

            var grid = document.getElementById("doc-list");
            if (!filtered.length) {
                grid.innerHTML = '<div class="empty-state"><h3>No work packages found</h3><p>Try adjusting your filters.</p></div>';
                return;
            }

            grid.innerHTML = filtered.map(function (wp) {
                var statusLabel = STATUS_LABELS[wp.status] || wp.status;
                var badgeClass = "badge badge-" + wp.status;
                var href = wp.spec_url || ("./docs/" + wp.slug + ".html");
                var wpTickets = ticketsByWp[wp.id] || [];
                var wpPrs = prsByWp[wp.id] || [];
                var wpFb = feedbackBySlug[wp.slug] || [];
                var pendingFb = wpFb.filter(function (f) { return !f.is_addressed; });
                var prOpen = wpPrs.filter(function (p) { return p.pr_status === "open"; }).length;
                var prMerged = wpPrs.filter(function (p) { return p.pr_status === "merged"; }).length;
                var rice = calcRice(wp);

                var chips = "";

                if (wpTickets.length > 0) {
                    chips += '<span class="chip chip-ticket">' + ICON_TICKET + wpTickets.length + ' ticket' + (wpTickets.length > 1 ? 's' : '') + '</span>';
                }

                if (prOpen > 0) {
                    chips += '<span class="chip chip-pr-open">' + ICON_PR + prOpen + ' PR open</span>';
                }
                if (prMerged > 0) {
                    chips += '<span class="chip chip-pr-merged">' + ICON_PR + prMerged + ' merged</span>';
                }

                if (wp.customer_affected) {
                    chips += '<span class="chip chip-customer">' + ICON_CUSTOMER + esc(wp.customer_affected) + '</span>';
                }

                if (rice != null) {
                    chips += '<span class="chip chip-rice ' + riceClass(rice) + '">' + ICON_RICE + 'RICE ' + rice.toFixed(1) + '</span>';
                }

                if (pendingFb.length > 0) {
                    chips += '<span class="chip chip-feedback">' + ICON_FEEDBACK + pendingFb.length + ' feedback</span>';
                }

                var footer = "";
                if (wpTickets.length > 0 || wpPrs.length > 0) {
                    var footerItems = "";
                    wpTickets.forEach(function (t) {
                        footerItems += '<a class="ticket-link" href="' + esc(t.jira_url) + '" target="_blank" onclick="event.stopPropagation();event.preventDefault();window.open(this.href)">' + esc(t.jira_key) + '</a>';
                    });
                    if (wpTickets.length > 0 && wpPrs.length > 0) {
                        footerItems += '<span class="footer-sep"></span>';
                    }
                    wpPrs.forEach(function (p) {
                        var cls = p.pr_status === "merged" ? "pr-merged" : (p.pr_status === "closed" ? "pr-closed" : "pr-open");
                        footerItems += '<a class="pr-link ' + cls + '" href="' + esc(p.pr_url) + '" target="_blank" onclick="event.stopPropagation();event.preventDefault();window.open(this.href)">#' + p.pr_number + '</a>';
                    });
                    footer = '<div class="doc-card-footer">' + footerItems + '</div>';
                }

                var riceDetail = "";
                if (wp.rice_reach != null && wp.rice_impact != null && wp.rice_confidence != null && wp.rice_effort != null) {
                    riceDetail = '<div class="doc-card-footer" style="font-size:11px;color:var(--text-muted);gap:12px">' +
                        '<span>R:' + wp.rice_reach + '</span>' +
                        '<span>I:' + Number(wp.rice_impact).toFixed(1) + '</span>' +
                        '<span>C:' + wp.rice_confidence + '%</span>' +
                        '<span>E:' + Number(wp.rice_effort).toFixed(1) + '</span>' +
                    '</div>';
                }

                return '<a href="' + esc(href) + '" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-card-body">' +
                        '<div class="doc-card-header">' +
                            '<div>' +
                                '<h3>' + esc(wp.title) + '</h3>' +
                                '<p>' + esc(wp.description) + '</p>' +
                            '</div>' +
                            '<div class="doc-card-right">' +
                                '<div class="date">' + formatDate(wp.created_at) + '</div>' +
                                '<div class="' + badgeClass + '">' + esc(statusLabel) + '</div>' +
                            '</div>' +
                        '</div>' +
                        (chips ? '<div class="doc-card-chips">' + chips + '</div>' : '') +
                        footer +
                        riceDetail +
                    '</div>' +
                '</a>';
            }).join("");
        }

        function loadAll() {
            return Promise.all([
                fetch(API + "/work_packages?select=*&order=created_at.desc", { headers: headers }).then(function (r) { return r.json(); }),
                fetch(API + "/work_package_tickets?select=*&order=created_at.asc", { headers: headers }).then(function (r) { return r.json(); }),
                fetch(API + "/work_package_prs?select=*&order=created_at.asc", { headers: headers }).then(function (r) { return r.json(); }),
                fetch(API + "/feedback?select=*&order=created_at.desc", { headers: headers }).then(function (r) { return r.json(); })
            ]);
        }

        function init(results) {
            allPackages = Array.isArray(results[0]) ? results[0] : [];
            allTickets = Array.isArray(results[1]) ? results[1] : [];
            allPrs = Array.isArray(results[2]) ? results[2] : [];
            allFeedback = Array.isArray(results[3]) ? results[3] : [];

            if (allPackages.length === 0) {
                renderFallback();
                return;
            }

            document.getElementById("filter-bar").style.display = "";
            renderStats(allPackages);
            renderCards();

            document.getElementById("filter-status").addEventListener("change", renderCards);
            document.getElementById("sort-by").addEventListener("change", renderCards);
        }

        loadAll()
            .then(init)
            .catch(function () { renderFallback(); });

        function renderFallback() {
            var grid = document.getElementById("doc-list");
            grid.innerHTML =
                '<a href="./docs/safety-incident-management.html" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-card-body"><div class="doc-card-header"><div><h3>Safety & Incident Management</h3><p>Comprehensive safety incident tracking, OSHA compliance, investigation workflows</p></div><div class="doc-card-right"><div class="date">Mar 11, 2026</div><div class="badge badge-pending_review">Pending Review</div></div></div></div>' +
                '</a>' +
                '<a href="./docs/personnel-qr-codes.html" class="doc-card">' +
                    '<div class="doc-icon">' + DOC_ICON + '</div>' +
                    '<div class="doc-card-body"><div class="doc-card-header"><div><h3>Personnel QR Codes</h3><p>Scannable QR stickers for personnel showing certifications, emergency contacts</p></div><div class="doc-card-right"><div class="date">Mar 11, 2026</div><div class="badge badge-pending_review">Pending Review</div></div></div></div>' +
                '</a>';
        }
    })();
    </script>
</body>
</html>
